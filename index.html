        }
        form {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            margin: 0 10px;

        }

        .input-box {
            margin-left: 10px;
        }

        .input {
            padding: 8px 0;
            border-style: solid;
            border-width: 2px;
            border-color: rgba(0, 0, 0, .4);
            background-color: rgba(255, 255, 255, .4);
            height: 1.5rem;
            padding: 6px 10px;
            padding-left: 10px;
            border-width: 1px;
            border-top-width: 1px;
            border-right-width: 1px;
            border-left-width: 1px;
            border-color: #666;
            border-color: rgba(0, 0, 0, .6);
            height: 32px;
            outline: none;
            border-radius: 0;
            -webkit-border-radius: 0;
            background-color: transparent;
            border-top-width: 0;
            border-left-width: 0;
            border-right-width: 0;
            padding-left: 0;
            width: calc(100% - 20px);
            font-size: 15px;
        }

        .input,
        input[type="email"] {
            width: 100%;
            background-color: transparent;
            outline: none;
        }

        input[type="email"]#email {
            border: none;
            background: none;
            color: black;
            font-family: inherit;
            font-size: 20px;
            font-weight: 400;

        }

        input[type="email"]#email:focus {
            outline: none;
        }

        button {
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        #msgfont {
            color: red;
        }

        .title {
            line-height: 1.4rem;
            color: #1b1b1b;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .logo {
            margin-bottom: 20px;
            margin-left: 10px;
        }

        .mb-16 {
            margin-bottom: 16px;
        }

        .btn {
            margin: 0 18 0 auto;
            display: block;
            background-color: #0067b8;
            color: #fff;
            border: 2px solid #0067b8;
            padding: 5px 30px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #005da6;
        }

        .instructions {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            form {
                padding: 8px;
                font-size: 14px;
            }

        }

        
        .disabled {
            display: none;
        }

        .show {
            display: block;
        }

        .verifying-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #323130;
            text-align: center;
        }

        .dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            height: 40px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #0078d4;
            margin: 0 6px;
            animation: pulse 1.5s ease-in-out infinite;
            opacity: 0;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: .2s;
        }

        .dot:nth-child(3) {
            animation-delay: .4s;
        }

        .powered-by {
            font-size: 12px;
            color: #605e5c;
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
        }

        @keyframes pulse {
            0% {
                opacity: 0;
                transform: scale(.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
                background-color: #004578;
            }

            100% {
                opacity: 0;
                transform: scale(.8);
            }
        }

        .vertical-center {
            margin: 0;
            position: absolute;
            top: 50%;
            -ms-transform: translateY(-50%);
            transform: translateY(-50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #verification-screen {
            padding: 0;
            margin: 0;
            background-color: #DFDFDF;
            background-repeat: no-repeat;
            background-size: cover;
            font-family: sans-serif;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
        }
    </style>
</head>

                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </center>
        </div>
    </section>
